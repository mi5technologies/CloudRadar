rules:
  - id: secretsmanager_rotation_disabled
    resource_type: secretsmanager
    category: IDENTITY
    severity: high
    title: Secrets Manager secret rotation should be enabled
    condition: {op: false, key: rotation_enabled}
    required: false

  - id: secretsmanager_not_rotated_90d
    resource_type: secretsmanager
    category: IDENTITY
    severity: medium
    title: Secret not rotated in 90+ days
    description: Secret has not been rotated in over 90 days
    condition: {op: gt, key: days_since_rotation, value: 90}
    required: false
